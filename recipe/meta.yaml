{% set name = "ukb-atlas" %}
{% set python_min = "3.10" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ukb_atlas-{{ version }}.tar.gz
  sha256: b15839b889bf81f375ad9f4a220040e6dfdaf2d7f3b57e20eb3286dd9414e389

build:
  number: 0
  noarch: python
  entry_points:
    - "ukb-atlas=ukb.cli:main"
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - python-gmsh
    - meshio
    - pyvista
    - h5py
    - scipy

test:
  requires:
    - python {{ python_min }}
    - pytest
    - pytest-cov
    - pip
  imports:
    - ukb
  source_files:
    - tests/
    - pyproject.toml
  commands:
    - ukb-atlas --help
    - pytest --log-cli-level=debug -vvs --maxfail 4 tests


about:
  home: https://github.com/ComputationalPhysiology/ukb-atlas
  summary: Generate meshes from UK Biobank data
  license: MIT
  license_file: LICENSE
  doc_url: https://computationalphysiology.github.io/ukb-atlas
  dev_url: https://github.com/ComputationalPhysiology/ukb-atlas

extra:
  recipe-maintainers:
    - finsberg
